<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="cont.css">
</head>
<body>

<section class="contact">
    <div class="container">
        <h2 class="section-title">Contact Us</h2>
        <p class="section-subtitle">We’d love to hear from you. Send us a message!</p>

        <div class="contact-wrapper">

            <!-- Contact Info -->
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p><strong>Email:</strong> jijioleyo7@gmail.com</p>
                <p><strong>Phone:</strong> +256786490987</p>
                <p><strong>Address:</strong> Entebbe Main Street, Kampala</p>
            </div>

            <!-- Contact Form -->
            <form class="contact-form">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <input type="email" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <input type="text" placeholder="Subject">
                </div>

                <div class="form-group">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>

        </div>
    </div>
</section>

</body>
</html>
