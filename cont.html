<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="cont.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
</head>
<body>

<section class="contact">
    <div class="container">
        <h2 class="section-title">Contact Us</h2>
        <p class="section-subtitle">We’d love to hear from you. Send us a message!</p>

        <div class="contact-wrapper">

            <!-- Contact Info -->
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p><strong>Email:</strong> jijioleyo7@gmail.com</p>
                <p><strong>Phone:</strong> +256786490987</p>
                <p><strong>Address:</strong> Entebbe Main Street, Kampala</p>
            </div>

            <!-- Contact Form -->
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <input type="text" name="user_name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <input type="email" name="user_email" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <input type="text" name="subject" placeholder="Subject" required>
                </div>

                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
                <p id="statusMessage" style="margin-top: 10px; text-align: center;"></p>
            </form>

        </div>
    </div>
</section>

<script>
    // Initialize EmailJS
    emailjs.init("YOUR_PUBLIC_KEY");

    // Handle form submission
    document.getElementById("contactForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const statusMessage = document.getElementById("statusMessage");
        statusMessage.textContent = "Sending...";
        statusMessage.style.color = "#007bff";

        // Send email
        emailjs.sendForm("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", this)
            .then(function() {
                statusMessage.textContent = "✓ Message sent successfully! I'll get back to you soon.";
                statusMessage.style.color = "#28a745";
                document.getElementById("contactForm").reset();
            }, function(error) {
                statusMessage.textContent = "✗ Error sending message. Please try again.";
                statusMessage.style.color = "#dc3545";
                console.log("Error:", error);
            });
    });
</script>

</body>
</html>
