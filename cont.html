<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <link rel="stylesheet" href="cont.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
</head>
<body>

<section class="contact">
    <div class="container">
        <h2 class="section-title">Contact Us</h2>
        <p class="section-subtitle">We’d love to hear from you. Send us a message!</p>

        <div class="contact-wrapper">

            <!-- Contact Info -->
            <div class="contact-info">
                <h3>Get in Touch</h3>
                <p class="contact-subtitle">We're here to help. Reach out to us using any of the methods below.</p>
                
                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-details">
                        <h4>Email</h4>
                        <a href="mailto:jijioleyo7@gmail.com">jijioleyo7@gmail.com</a>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-details">
                        <h4>Phone</h4>
                        <a href="tel:+256786490987">+256 786 490 987</a>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="contact-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="contact-details">
                        <h4>Location</h4>
                        <p>Entebbe Main Street, Kampala</p>
                    </div>
                </div>

                <div class="social-connect">
                    <h4>Follow Us</h4>
                    <div class="social-icons">
                        <a href="https://www.facebook.com/Jiji Oleyo" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="https://wa.me/+256786490987" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                        <a href="https://linkedin.com" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <input type="text" name="user_name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <input type="email" name="user_email" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <input type="text" name="subject" placeholder="Subject" required>
                </div>

                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
                <p id="statusMessage" style="margin-top: 10px; text-align: center;"></p>
            </form>

        </div>
    </div>
</section>

<script>
    // Initialize EmailJS
    emailjs.init("YOUR_PUBLIC_KEY");

    // Handle form submission
    document.getElementById("contactForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const statusMessage = document.getElementById("statusMessage");
        statusMessage.textContent = "Sending...";
        statusMessage.style.color = "#007bff";

        // Send email
        emailjs.sendForm("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", this)
            .then(function() {
                statusMessage.textContent = "✓ Message sent successfully! I'll get back to you soon.";
                statusMessage.style.color = "#28a745";
                document.getElementById("contactForm").reset();
            }, function(error) {
                statusMessage.textContent = "✗ Error sending message. Please try again.";
                statusMessage.style.color = "#dc3545";
                console.log("Error:", error);
            });
    });
</script>

</body>
</html>
